<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AtoZ Servos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
        background-color: #f4f6fc; /* light background */
      }

      header {
        background: linear-gradient(to bottom, #1c2833, #2c3e50); /* 3D-style */
        color: white;
        padding: 24px;
        text-align: center;
        border-bottom-left-radius: 30px;
        border-bottom-right-radius: 30px;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15); /* depth shadow */
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 1px;
      }

      .content {
        padding: 40px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Welcome to AtoZ Servos</h1>
    </header>

    <div class="content">
      <p>Your trusted destination for all things smart & servo-powered 💡⚙️</p>
    </div>
  </body>
</html>
