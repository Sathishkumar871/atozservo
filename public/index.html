<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AtoZ Servos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="icon" type="round-logo" href="logo.jpg" />


  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background-color: #f0f2f5;
      color: #333;
    }

    header {
      background: linear-gradient(to bottom, #1c2833, #2c3e50);
      color: white;
      padding: 20px 40px;
      text-align: center;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    .content {
      max-width: 1024px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    .content p {
      font-size: 1.2rem;
      line-height: 1.6;
    }

    /* 🎯 Responsive Adjustments */
    @media (max-width: 768px) {
      header {
        padding: 16px 20px;
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
      }

      header h1 {
        font-size: 1.8rem;
      }

      .content {
        margin: 30px 16px;
      }

      .content p {
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 12px 16px;
        border-bottom-left-radius: 16px;
        border-bottom-right-radius: 16px;
      }

      header h1 {
        font-size: 1.5rem;
      }

      .content p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to AtoZ Servos</h1>
  </header>

  <div class="content">
    <p>Your go-to hub for smart servo-powered solutions — now beautifully responsive across all screens!>
  </div>
</body>
</html>
